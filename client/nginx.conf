server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — mọi route trả về index.html (react-router xử lý client-side).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache asset có hash lâu dài.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
